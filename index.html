<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFlow — Планировщик</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Outfit', sans-serif; display: flex; transition: background 0.4s; }
button { font-family: 'Outfit', sans-serif; cursor: pointer; }
input, textarea { font-family: 'Outfit', sans-serif; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { border-radius: 3px; background: rgba(120,120,140,0.25); }

/* Sidebar */
#sidebar {
  width: 56px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; padding: 14px 0; gap: 6px; z-index: 50;
  transition: background 0.4s, border-color 0.4s;
}
.sb {
  width: 42px; height: 42px; border-radius: 12px; border: none;
  font-size: 20px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; position: relative;
}
.sb.on { transform: scale(1.08); }
.sb .tip {
  position: absolute; left: 52px; white-space: nowrap; font-size: 11px;
  font-weight: 600; padding: 5px 10px; border-radius: 8px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
  transform: translateX(-6px); z-index: 999;
}
.sb:hover .tip { opacity: 1; transform: translateX(0); }

/* Panels */
#panels { flex: 1; position: relative; overflow: hidden; }
.pnl {
  position: absolute; inset: 0; overflow-y: auto;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
}
.pnl.act { transform: translateX(0); opacity: 1; }
.pnl.off-l { transform: translateX(-100%); opacity: 0; pointer-events: none; }
.pnl.off-r { transform: translateX(100%); opacity: 0; pointer-events: none; }

/* Board */
.board {
  max-width: 1280px; margin: 0 auto; padding: 0 28px 40px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
@media (max-width: 900px) { .board { grid-template-columns: 1fr; } }

.col {
  border-radius: 16px; padding: 14px; display: flex; flex-direction: column;
  min-height: 180px; transition: border-color 0.2s, background 0.2s;
}
.col.dragover { outline: 2px dashed; outline-offset: -4px; }
.col-body { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 50px; }

/* Cards */
.card {
  border-radius: 12px; padding: 12px; position: relative;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.card:hover { transform: translateY(-2px); }
.card.dragging { opacity: 0.3; transform: scale(0.97); }
.dh {
  cursor: grab; user-select: none; padding: 2px 4px; font-size: 14px;
  opacity: 0.35; transition: opacity 0.15s; touch-action: none;
}
.dh:hover { opacity: 0.8; }
.dh:active { cursor: grabbing; }
.drop-ind { height: 4px; border-radius: 2px; margin: -2px 0; transition: opacity 0.15s; }
.ghost {
  position: fixed; pointer-events: none; z-index: 9999; opacity: 0.85;
  transform: rotate(2deg); box-shadow: 0 12px 40px rgba(0,0,0,0.3); border-radius: 12px;
}

/* File chips */
.fchip {
  display: flex; align-items: center; gap: 6px; padding: 5px 7px;
  border-radius: 7px; cursor: pointer; transition: filter 0.15s;
}
.fchip:hover { filter: brightness(1.08); }

/* Theme picker */
.tp-bg { position: fixed; inset: 0; z-index: 9998; }
.tp {
  position: fixed; border-radius: 16px; padding: 12px; min-width: 220px;
  z-index: 9999; max-height: 75vh; overflow-y: auto;
}
.tp-opt {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 10px; border-radius: 10px; border: none;
  background: transparent; font-size: 13px; transition: background 0.15s;
}

/* Overlay / Forms */
.overlay {
  position: fixed; inset: 0; backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
}
.fcard {
  border-radius: 20px; padding: 28px; width: 100%; max-width: 500px;
  max-height: 88vh; overflow-y: auto;
}
.flbl {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 5px; display: block; margin-top: 14px;
}
.finp {
  width: 100%; padding: 9px 12px; border-radius: 10px; font-size: 13px; outline: none;
}

/* Tools */
.tools-page { padding: 32px; }
.tools-inner { max-width: 800px; margin: 0 auto; }
.tcard { border-radius: 16px; padding: 28px; }
.trow { display: flex; gap: 16px; flex-wrap: wrap; }
.tcol { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
.tta {
  width: 100%; min-height: 180px; border-radius: 10px; padding: 12px;
  font-size: 13px; resize: vertical; outline: none; line-height: 1.6;
}
.topts { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 14px 0; }
.topts label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.tbtn {
  padding: 10px 24px; border-radius: 10px; border: none; color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.tbtn2 {
  padding: 8px 18px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 500; cursor: pointer;
}
</style>
</head>
<body>
  <div id="sidebar"></div>
  <div id="panels">
    <div class="pnl act" id="pnl-planner"></div>
    <div class="pnl off-r" id="pnl-tools"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
