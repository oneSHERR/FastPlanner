<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkFlow — Планировщик</title>
  <meta name="description" content="WorkFlow — командный планировщик задач">
  <meta name="theme-color" content="#0a0a18">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Auth Screen -->
  <div class="auth-wrap" id="auth-screen">
    <div class="auth-card" id="auth-card"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar" style="display:none"></div>

  <!-- Panels -->
  <div id="panels" class="panels" style="display:none">
    <div class="pnl act" id="pnl-planner"></div>
    <div class="pnl off-r" id="pnl-teams"></div>
    <div class="pnl off-r" id="pnl-tools"></div>
    <div class="pnl off-r" id="pnl-game"></div>
    <div class="pnl off-r" id="pnl-profile"></div>
  </div>

  <!-- JS Modules (order matters!) -->
  <script src="firebase-config.js"></script>
  <script src="themes.js"></script>
  <script src="auth.js"></script>
  <script src="teams.js"></script>
  <script src="tasks.js"></script>
  <script src="planner.js"></script>
  <script src="form.js"></script>
  <script src="preview.js"></script>
  <script src="sidebar.js"></script>
  <script src="profile.js"></script>
  <script src="tools.js"></script>
  <script src="game.js"></script>
  <script src="app.js"></script>

</body>
</html>
